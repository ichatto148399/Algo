<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports – UMSync</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    @media print {
      .sidebar, .topbar, .toolbar, .btn, .tabs { display: none !important; }
      .main-content { margin-left: 0 !important; }
      .card { box-shadow: none !important; border: 1px solid #ddd; }
    }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="page-content">

      <div class="page-header">
        <div><h2>Reports</h2><p>Generate and export academic reports</p></div>
        <button class="btn btn-primary" onclick="window.print()">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print / Export PDF
        </button>
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('faculty')">Faculty Loading</button>
        <button class="tab-btn" onclick="switchTab('room')">Room Utilization</button>
        <button class="tab-btn" onclick="switchTab('master')">Master Schedule</button>
        <button class="tab-btn" onclick="switchTab('conflict')">Conflict Report</button>
      </div>

      <!-- Faculty Loading Report -->
      <div class="tab-pane active" id="tab-faculty">
        <div class="card" style="margin-bottom:16px">
          <div class="card-body">
            <div class="toolbar">
              <select class="filter-select" id="rpt-dept" onchange="renderFacultyReport()">
                <option value="">All Departments</option>
                <option>BSIT</option><option>BSCS</option><option>BSCE</option>
              </select>
            </div>
            <div id="faculty-report"></div>
          </div>
        </div>
      </div>

      <!-- Room Utilization Report -->
      <div class="tab-pane" id="tab-room">
        <div class="card">
          <div class="card-body" id="room-report"></div>
        </div>
      </div>

      <!-- Master Schedule -->
      <div class="tab-pane" id="tab-master">
        <div class="card">
          <div class="card-body">
            <div class="toolbar">
              <select class="filter-select" id="ms-program" onchange="renderMasterSchedule()">
                <option value="">All Programs</option>
                <option>BSIT</option><option>BSCS</option><option>BSCE</option>
              </select>
              <select class="filter-select" id="ms-year" onchange="renderMasterSchedule()">
                <option value="">All Year Levels</option>
                <option value="1">1st Year</option><option value="2">2nd Year</option>
                <option value="3">3rd Year</option><option value="4">4th Year</option>
              </select>
            </div>
            <div id="master-schedule"></div>
          </div>
        </div>
      </div>

      <!-- Conflict Report -->
      <div class="tab-pane" id="tab-conflict">
        <div class="card">
          <div class="card-body" id="conflict-report"></div>
        </div>
      </div>
    </main>
  </div>
</div>


<script src="js/auth.js"></script>
<script>
  Auth.requireAuth(['admin','registrar']);
  UI.renderSidebar('reports');
  UI.renderTopbar('Reports', 'View system reports');

  let allFaculty = [], allRooms = [], allSchedules = [], allConflicts = [];

  // ── Tab switching ──
  function switchTab(tab) {
    const tabs = ['faculty','room','master','conflict'];
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', tabs[i] === tab));
    document.querySelectorAll('.tab-pane').forEach((p,i) => p.classList.toggle('active', `tab-${tabs[i]}` === `tab-${tab}`));
    if (tab === 'faculty') renderFacultyReport();
    if (tab === 'room')    renderRoomReport();
    if (tab === 'master')  renderMasterSchedule();
    if (tab === 'conflict') renderConflictReport();
  }

  // ── Faculty Loading ──
  async function renderFacultyReport() {
    const dept = document.getElementById('rpt-dept').value;
    const area = document.getElementById('faculty-report');
    area.innerHTML = '<p style="color:var(--text-muted)">Loading...</p>';
    try {
      const res    = await fetch(BACKEND + 'reports.php?action=faculty_loading');
      const result = await res.json();
      if (!result.success) { area.innerHTML = '<p style="color:red">Failed to load.</p>'; return; }
      let data = result.data;
      if (dept) data = data.filter(f => f.department === dept);
      area.innerHTML = data.length ? `
        <div class="table-wrapper"><table>
          <thead><tr><th>Faculty</th><th>Department</th><th style="text-align:center">Total Units</th><th style="text-align:center">Max Units</th><th style="text-align:center">Remaining</th><th style="text-align:center">Status</th></tr></thead>
          <tbody>${data.map(f => `<tr>
            <td class="fw-bold">${f.name}</td>
            <td>${f.department || '—'}</td>
            <td style="text-align:center">${f.total_units}</td>
            <td style="text-align:center">${f.max_units}</td>
            <td style="text-align:center">${f.remaining_units}</td>
            <td><span class="badge badge-${f.status==='overloaded'?'danger':f.remaining_units==0?'warning':'success'}">${f.status}</span></td>
          </tr>`).join('')}</tbody>
        </table></div>` : '<p style="text-align:center;padding:30px;color:var(--text-muted)">No faculty data found.</p>';
    } catch(e) { area.innerHTML = '<p style="color:red">Error loading report.</p>'; }
  }

  // ── Room Utilization ──
  async function renderRoomReport() {
    const area = document.getElementById('room-report');
    area.innerHTML = '<p style="color:var(--text-muted)">Loading...</p>';
    try {
      const res    = await fetch(BACKEND + 'reports.php?action=room_usage');
      const result = await res.json();
      if (!result.success) { area.innerHTML = '<p style="color:red">Failed to load.</p>'; return; }
      const data = result.data;
      area.innerHTML = data.length ? `
        <div class="table-wrapper"><table>
          <thead><tr><th>Room</th><th>Building</th><th>Type</th><th style="text-align:center">Capacity</th><th style="text-align:center">Classes Scheduled</th><th style="text-align:center">Status</th></tr></thead>
          <tbody>${data.map(r => `<tr>
            <td class="fw-bold">${r.number}</td>
            <td>${r.building || '—'}</td>
            <td>${r.type}</td>
            <td style="text-align:center">${r.capacity}</td>
            <td style="text-align:center">${r.total_schedules}</td>
            <td><span class="badge badge-${r.status==='available'?'success':'danger'}">${r.status}</span></td>
          </tr>`).join('')}</tbody>
        </table></div>` : '<p style="text-align:center;padding:30px;color:var(--text-muted)">No room data found.</p>';
    } catch(e) { area.innerHTML = '<p style="color:red">Error loading report.</p>'; }
  }

  // ── Master Schedule ──
  async function renderMasterSchedule() {
    const program = document.getElementById('ms-program').value;
    const year    = document.getElementById('ms-year').value;
    const area    = document.getElementById('master-schedule');
    area.innerHTML = '<p style="color:var(--text-muted)">Loading...</p>';
    try {
      const res    = await fetch(BACKEND + 'reports.php?action=master_schedule');
      const result = await res.json();
      if (!result.success) { area.innerHTML = '<p style="color:red">Failed to load.</p>'; return; }
      let data = result.data;
      if (program) data = data.filter(s => s.program === program);
      if (year)    data = data.filter(s => String(s.year_level) === String(year));
      area.innerHTML = data.length ? `
        <div class="table-wrapper"><table>
          <thead><tr><th>Subject</th><th>Section</th><th>Faculty</th><th>Room</th><th>Day</th><th>Time</th><th>Type</th></tr></thead>
          <tbody>${data.map(s => `<tr>
            <td><div class="fw-bold">${s.subject_code}</div><div style="font-size:11px;color:var(--text-muted)">${s.subject_title}</div></td>
            <td>${s.section}</td>
            <td style="font-size:12px">${s.faculty_name}</td>
            <td><span class="badge badge-info">${s.room_number}</span></td>
            <td>${s.day}</td>
            <td style="font-size:12px">${s.start_time} – ${s.end_time}</td>
            <td><span class="badge badge-${s.type==='Laboratory'?'warning':'primary'}">${s.type}</span></td>
          </tr>`).join('')}</tbody>
        </table></div>` : '<p style="text-align:center;padding:30px;color:var(--text-muted)">No schedules found.</p>';
    } catch(e) { area.innerHTML = '<p style="color:red">Error loading report.</p>'; }
  }

  // ── Conflict Report ──
  async function renderConflictReport() {
    const area = document.getElementById('conflict-report');
    area.innerHTML = '<p style="color:var(--text-muted)">Loading...</p>';
    try {
      const res    = await fetch(BACKEND + 'schedules.php?action=check_conflicts');
      const result = await res.json();
      if (!result.success) { area.innerHTML = '<p style="color:red">Failed to load.</p>'; return; }
      const conflicts = result.conflicts;
      area.innerHTML = conflicts.length
        ? `<h3 style="margin-bottom:16px;font-size:15px;font-weight:700;color:red">⚠ ${conflicts.length} Conflict(s) Found</h3>
          <div class="table-wrapper"><table>
            <thead><tr><th>Type</th><th>Detail</th><th>Schedule 1</th><th>Schedule 2</th></tr></thead>
            <tbody>${conflicts.map(c => `<tr>
              <td><span class="badge badge-danger">${c.type}</span></td>
              <td style="font-size:12px">${c.detail}</td>
              <td style="font-size:12px">${c.s1.subject_code} ${c.s1.section} ${c.s1.day} ${c.s1.start_time}</td>
              <td style="font-size:12px">${c.s2.subject_code} ${c.s2.section} ${c.s2.day} ${c.s2.start_time}</td>
            </tr>`).join('')}</tbody>
          </table></div>`
        : '<div style="text-align:center;padding:40px;color:green;font-size:15px">✓ No conflicts found! All schedules are clear.</div>';
    } catch(e) { area.innerHTML = '<p style="color:red">Error loading report.</p>'; }
  }

  // Load default tab on page load
  renderFacultyReport();
</script>
</body>
</html>
