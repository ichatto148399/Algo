<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports – UMSync</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    @media print {
      .sidebar, .topbar, .toolbar, .btn, .tabs { display: none !important; }
      .main-content { margin-left: 0 !important; }
      .card { box-shadow: none !important; border: 1px solid #ddd; }
    }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="page-content">

      <div class="page-header">
        <div><h2>Reports</h2><p>Generate and export academic reports</p></div>
        <button class="btn btn-primary" onclick="window.print()">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print / Export PDF
        </button>
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('faculty')">Faculty Loading</button>
        <button class="tab-btn" onclick="switchTab('room')">Room Utilization</button>
        <button class="tab-btn" onclick="switchTab('master')">Master Schedule</button>
        <button class="tab-btn" onclick="switchTab('conflict')">Conflict Report</button>
      </div>

      <!-- Faculty Loading Report -->
      <div class="tab-pane active" id="tab-faculty">
        <div class="card" style="margin-bottom:16px">
          <div class="card-body">
            <div class="toolbar">
              <select class="filter-select" id="rpt-dept" onchange="renderFacultyReport()">
                <option value="">All Departments</option>
                <option>BSIT</option><option>BSCS</option><option>BSCE</option>
              </select>
            </div>
            <div id="faculty-report"></div>
          </div>
        </div>
      </div>

      <!-- Room Utilization Report -->
      <div class="tab-pane" id="tab-room">
        <div class="card">
          <div class="card-body" id="room-report"></div>
        </div>
      </div>

      <!-- Master Schedule -->
      <div class="tab-pane" id="tab-master">
        <div class="card">
          <div class="card-body">
            <div class="toolbar">
              <select class="filter-select" id="ms-program" onchange="renderMasterSchedule()">
                <option value="">All Programs</option>
                <option>BSIT</option><option>BSCS</option><option>BSCE</option>
              </select>
              <select class="filter-select" id="ms-year" onchange="renderMasterSchedule()">
                <option value="">All Year Levels</option>
                <option value="1">1st Year</option><option value="2">2nd Year</option>
                <option value="3">3rd Year</option><option value="4">4th Year</option>
              </select>
            </div>
            <div id="master-schedule"></div>
          </div>
        </div>
      </div>

      <!-- Conflict Report -->
      <div class="tab-pane" id="tab-conflict">
        <div class="card">
          <div class="card-body" id="conflict-report"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script>
  Auth.requireAuth(['admin','registrar']);
  UI.renderSidebar('reports');
  UI.renderTopbar('Reports', 'Academic year 2025–2026 | 1st Semester');

  function switchTab(tab) {
    const tabs = ['faculty','room','master','conflict'];
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', tabs[i] === tab));
    document.querySelectorAll('.tab-pane').forEach((p,i) => p.classList.toggle('active', `tab-${tabs[i]}` === `tab-${tab}`));
    if (tab === 'room') renderRoomReport();
    if (tab === 'master') renderMasterSchedule();
    if (tab === 'conflict') renderConflictReport();
  }

  function renderFacultyReport() {
    const dept = document.getElementById('rpt-dept').value;
    const faculty = DB.users.filter(u => u.role === 'faculty' && (!dept || u.department === dept));

    const rows = faculty.length
      ? faculty.map(f => {
          const schedules = DB.schedules.filter(s => s.facultyId === f.id);
          const units = schedules.reduce((sum, s) => { const subj = DB.subjects.find(sub => sub.id === s.subjectId); return sum + (subj ? subj.units : 0); }, 0);
          const max = f.maxUnits || 21;
          const status = units > max ? 'Overload' : units === 0 ? 'No Load' : units >= max * 0.8 ? 'Full Load' : 'Partial Load';
          const statusColor = units > max ? 'danger' : units === 0 ? 'secondary' : units >= max * 0.8 ? 'success' : 'warning';
          return `<tr>
            <td>${f.employeeId || '–'}</td>
            <td class="fw-bold">${f.name}</td>
            <td>${f.department}</td>
            <td>${schedules.map(s => `<span class="badge badge-primary" style="margin:1px">${s.subjectCode}</span>`).join('') || '–'}</td>
            <td style="text-align:center;font-weight:700">${units}</td>
            <td style="text-align:center">${max}</td>
            <td><span class="badge badge-${statusColor}">${status}</span></td>
          </tr>`;
        }).join('')
      : '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-muted)">No faculty accounts added yet.</td></tr>';

    const overloaded = faculty.filter(f => {
      const u = DB.schedules.filter(s=>s.facultyId===f.id).reduce((sum,s)=>{const sub=DB.subjects.find(x=>x.id===s.subjectId);return sum+(sub?sub.units:0);},0);
      return u > (f.maxUnits||21);
    }).length;
    const noLoad = faculty.filter(f => DB.schedules.filter(s=>s.facultyId===f.id).length === 0).length;

    document.getElementById('faculty-report').innerHTML = `
      <h3 style="margin-bottom:16px;font-size:15px;font-weight:700">Faculty Loading Report — AY 2025–2026, 1st Semester</h3>
      <div class="table-wrapper">
        <table>
          <thead><tr><th>Employee ID</th><th>Faculty Name</th><th>Department</th><th>Subjects</th><th>Total Units</th><th>Max Units</th><th>Load Status</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      ${faculty.length ? `<div style="margin-top:16px;padding:12px;background:#f7f9fc;border-radius:8px;font-size:13px">
        <strong>Summary:</strong> ${faculty.length} faculty member${faculty.length !== 1 ? 's' : ''} |
        ${overloaded} overloaded | ${noLoad} with no load
      </div>` : ''}`;
  }

  function renderRoomReport() {
    const rows = DB.rooms.length
      ? DB.rooms.map(r => {
          const scheds = DB.schedules.filter(s => s.roomId === r.id);
          const avgStudents = scheds.length ? Math.round(scheds.reduce((sum,s)=>sum+s.students,0)/scheds.length) : 0;
          const pct = Math.min(Math.round((scheds.length / 10) * 100), 100);
          const color = pct > 80 ? 'red' : pct > 50 ? 'orange' : 'green';
          return `<tr>
            <td class="fw-bold">${r.number}</td>
            <td>${r.building}</td>
            <td>${r.type}</td>
            <td style="text-align:center">${r.capacity}</td>
            <td style="text-align:center">${scheds.length}</td>
            <td style="text-align:center">${avgStudents || '–'}</td>
            <td style="min-width:140px">
              <div class="d-flex align-center gap-2">
                <div class="progress-bar-wrap" style="flex:1"><div class="progress-bar ${color}" style="width:${pct}%"></div></div>
                <span style="font-size:12px;font-weight:700;min-width:35px">${pct}%</span>
              </div>
            </td>
            <td><span class="badge badge-${r.status==='available'?'success':r.status==='maintenance'?'danger':'warning'}">${r.status}</span></td>
          </tr>`;
        }).join('')
      : '<tr><td colspan="8" style="text-align:center;padding:24px;color:var(--text-muted)">No rooms added yet.</td></tr>';

    document.getElementById('room-report').innerHTML = `
      <h3 style="margin-bottom:16px;font-size:15px;font-weight:700">Room Utilization Report — AY 2025–2026, 1st Semester</h3>
      <div class="table-wrapper">
        <table>
          <thead><tr><th>Room</th><th>Building</th><th>Type</th><th>Capacity</th><th>Classes/Week</th><th>Avg Students</th><th>Utilization %</th><th>Status</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  function renderMasterSchedule() {
    const program = document.getElementById('ms-program').value;
    const year = document.getElementById('ms-year').value;
    let schedules = DB.schedules;
    if (program) schedules = schedules.filter(s => s.section.startsWith(program));
    if (year) schedules = schedules.filter(s => { const subj = DB.subjects.find(x => x.id === s.subjectId); return subj && subj.yearLevel == year; });

    const sections = [...new Set(schedules.map(s => s.section))].sort();
    document.getElementById('master-schedule').innerHTML = `
      <h3 style="margin-bottom:16px;font-size:15px;font-weight:700">Master Schedule${program ? ' — ' + program : ''}${year ? ', Year ' + year : ''}</h3>
      ${sections.length ? sections.map(sec => {
        const secScheds = schedules.filter(s => s.section === sec);
        return `<div style="margin-bottom:20px">
          <h4 style="font-size:13px;font-weight:700;margin-bottom:8px;color:var(--primary)">${sec}</h4>
          <div class="table-wrapper">
            <table>
              <thead><tr><th>Subject Code</th><th>Title</th><th>Faculty</th><th>Room</th><th>Day</th><th>Time</th><th>Type</th><th>Units</th></tr></thead>
              <tbody>
                ${secScheds.map(s => {
                  const subj = DB.subjects.find(x => x.id === s.subjectId);
                  return `<tr>
                    <td><span class="badge badge-primary">${s.subjectCode}</span></td>
                    <td>${s.subjectTitle}</td>
                    <td style="font-size:12px">${s.facultyName}</td>
                    <td>${s.room}</td>
                    <td>${s.day}</td>
                    <td style="font-size:12px">${s.startTime}–${s.endTime}</td>
                    <td><span class="badge badge-${s.type==='Lab'?'warning':'secondary'}">${s.type}</span></td>
                    <td style="text-align:center">${subj ? subj.units : '–'}</td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>`;
      }).join('') : '<div class="empty-state"><p>No schedules found for the selected filters.</p></div>'}`;
  }

  function renderConflictReport() {
    const conflicts = [];
    DB.schedules.forEach((s1, i) => {
      DB.schedules.slice(i + 1).forEach(s2 => {
        if (s1.day !== s2.day) return;
        const overlap = s1.startTime < s2.endTime && s1.endTime > s2.startTime;
        if (!overlap) return;
        if (s1.facultyId === s2.facultyId) conflicts.push({ type: 'Faculty Conflict', s1, s2, detail: `${s1.facultyName} is scheduled in two classes simultaneously` });
        if (s1.roomId === s2.roomId) conflicts.push({ type: 'Room Conflict', s1, s2, detail: `${s1.room} is double-booked` });
        if (s1.section === s2.section) conflicts.push({ type: 'Section Conflict', s1, s2, detail: `Section ${s1.section} has overlapping classes` });
      });
    });

    document.getElementById('conflict-report').innerHTML = `
      <div class="d-flex justify-between align-center mb-2">
        <h3 style="font-size:15px;font-weight:700">Conflict Report — AY 2025–2026, 1st Semester</h3>
        <span class="badge badge-${conflicts.length ? 'danger' : 'success'}">${conflicts.length} conflict${conflicts.length !== 1 ? 's' : ''}</span>
      </div>
      ${conflicts.length ? `
        <div class="table-wrapper">
          <table>
            <thead><tr><th>Type</th><th>Detail</th><th>Schedule 1</th><th>Schedule 2</th><th>Day</th><th>Time Overlap</th></tr></thead>
            <tbody>
              ${conflicts.map(c => `<tr>
                <td><span class="badge badge-danger">${c.type}</span></td>
                <td style="font-size:12px">${c.detail}</td>
                <td><span class="badge badge-primary">${c.s1.subjectCode}</span> ${c.s1.section}</td>
                <td><span class="badge badge-primary">${c.s2.subjectCode}</span> ${c.s2.section}</td>
                <td>${c.s1.day}</td>
                <td style="font-size:12px">${c.s1.startTime}–${c.s1.endTime} / ${c.s2.startTime}–${c.s2.endTime}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>` :
        '<div class="alert alert-success">✓ No scheduling conflicts detected. All schedules are clear.</div>'}`;
  }

  renderFacultyReport();
</script>
</body>
</html>
