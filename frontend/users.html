<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management – UMSync</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="page-content">

      <div class="page-header">
        <div><h2>User Management</h2><p>Manage system accounts and roles</p></div>
        <button class="btn btn-primary" onclick="openAddUser()">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add User
        </button>
      </div>

      <div class="stat-grid" style="margin-bottom:20px">
        <div class="stat-card blue">
          <div class="stat-icon blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
          <div class="stat-info"><div class="stat-value" id="count-total">0</div><div class="stat-label">Total Users</div></div>
        </div>
        <div class="stat-card orange">
          <div class="stat-icon orange"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
          <div class="stat-info"><div class="stat-value" id="count-faculty">0</div><div class="stat-label">Faculty</div></div>
        </div>
        <div class="stat-card teal">
          <div class="stat-icon teal"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></div>
          <div class="stat-info"><div class="stat-value" id="count-registrar">0</div><div class="stat-label">Registrar</div></div>
        </div>
        <div class="stat-card green">
          <div class="stat-icon green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
          <div class="stat-info"><div class="stat-value" id="count-admin">0</div><div class="stat-label">Admins</div></div>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <div class="toolbar">
            <div class="search-box">
              <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" id="user-search" placeholder="Search users..." oninput="renderUsers()">
            </div>
            <select class="filter-select" id="user-role-filter" onchange="renderUsers()">
              <option value="">All Roles</option>
              <option value="admin">Admin</option>
              <option value="registrar">Registrar</option>
              <option value="faculty">Faculty</option>
            </select>
            <select class="filter-select" id="user-status-filter" onchange="renderUsers()">
              <option value="">All Status</option>
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr><th>Name</th><th>Username</th><th>Email</th><th>Role</th><th>Department</th><th>Status</th><th>Actions</th></tr>
              </thead>
              <tbody id="users-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- User Modal -->
<div class="modal-overlay" id="user-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="user-modal-title">Add User</h3>
      <button class="modal-close" onclick="UI.closeModal('user-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="uf-name" class="form-control" placeholder="Full name">
        </div>
        <div class="form-group">
          <label>Username *</label>
          <input type="text" id="uf-username" class="form-control" placeholder="Login username">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="uf-email" class="form-control" placeholder="email@school.edu">
        </div>
        <div class="form-group">
          <label id="uf-password-label">Password *</label>
          <input type="password" id="uf-password" class="form-control" placeholder="Set password">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Role *</label>
          <select id="uf-role" class="form-control" onchange="toggleFacultyFields()">
            <option value="faculty">Faculty</option>
            <option value="registrar">Registrar</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="form-group">
          <label>Department</label>
          <select id="uf-dept" class="form-control">
            <option>BSIT</option><option>BSCS</option><option>BSCE</option><option>GE</option><option>Registrar</option><option>IT</option>
          </select>
        </div>
      </div>
      <div id="faculty-fields">
        <div class="form-row">
          <div class="form-group">
            <label>Employee ID</label>
            <input type="text" id="uf-empid" class="form-control" placeholder="e.g. FAC-005">
          </div>
          <div class="form-group">
            <label>Max Teaching Units</label>
            <input type="number" id="uf-maxunits" class="form-control" value="21" min="1" max="30">
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="uf-status" class="form-control">
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>
      <div id="user-error" class="alert alert-danger" style="display:none">Please fill in all required fields.</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="UI.closeModal('user-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveUser()">Save User</button>
    </div>
  </div>
</div>


<script src="js/auth.js"></script>
<script>

  Auth.requireAuth(['admin']);
  UI.renderSidebar('users');
  UI.renderTopbar('User Management', 'Manage system accounts');

  let users = [];

  // Load users from PHP
  async function loadUsers() {
    const form = new FormData();
    form.append('action', 'get_all');
    const res    = await fetch(BACKEND + 'users.php', { method: 'POST', body: form });
    const result = await res.json();
    if (result.success) {
      users = result.data;
      renderUsers();
      updateCounts();
    }
  }

  function updateCounts() {
    document.getElementById('count-total').textContent = users.length;
    document.getElementById('count-faculty').textContent = users.filter(u=>u.role==='faculty').length;
    document.getElementById('count-registrar').textContent = users.filter(u=>u.role==='registrar').length;
    document.getElementById('count-admin').textContent = users.filter(u=>u.role==='admin').length;
  }

  function renderUsers() {
    const search = document.getElementById('user-search').value.toLowerCase();
    const role = document.getElementById('user-role-filter').value;
    const status = document.getElementById('user-status-filter').value;
    const data = users.filter(u =>
      (!search || u.name.toLowerCase().includes(search) || u.username.toLowerCase().includes(search) || u.email.toLowerCase().includes(search)) &&
      (!role || u.role === role) &&
      (!status || u.status === status)
    );
    const roleColors = { admin: 'danger', registrar: 'info', faculty: 'primary' };
    document.getElementById('users-tbody').innerHTML = data.map(u => {
      const initials = u.name.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
      return `<tr>
        <td>
          <div class="d-flex align-center gap-2">
            <div style="width:34px;height:34px;border-radius:50%;background:var(--primary-light);color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">${initials}</div>
            <div><div class="fw-bold">${u.name}</div>${u.employeeId ? `<div class="text-muted" style="font-size:11px">${u.employeeId}</div>` : ''}</div>
          </div>
        </td>
        <td><code style="background:var(--bg);padding:2px 6px;border-radius:4px;font-size:12px">${u.username}</code></td>
        <td style="font-size:12px">${u.email}</td>
        <td><span class="badge badge-${roleColors[u.role]||'secondary'}">${u.role}</span></td>
        <td>${u.department || '–'}</td>
        <td><span class="badge badge-${u.status==='active'?'success':'secondary'}">${u.status}</span></td>
        <td>
          <div class="d-flex gap-2">
            ${String(u.id) !== String(Auth.currentUser.id) ? `<button class="btn btn-sm btn-outline" onclick="editUser(${u.id})">Edit</button>` : ''}
            ${String(u.id) !== String(Auth.currentUser.id) ? `<button class="btn btn-sm btn-${u.status==='active'?'warning':'success'}" onclick="toggleStatus(${u.id})">${u.status==='active'?'Deactivate':'Activate'}</button>` : ''}
            ${String(u.id) !== String(Auth.currentUser.id) ? `<button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id})">Delete</button>` : ''}
            ${String(u.id) === String(Auth.currentUser.id) ? `<span style="font-size:12px;color:var(--text-muted);font-style:italic">Current user</span>` : ''}
          </div>
        </td>
      </tr>`;
    }).join('') || '<tr><td colspan="7" class="text-muted" style="text-align:center;padding:20px">No users found.</td></tr>';
  }

  function toggleFacultyFields() {
    const role = document.getElementById('uf-role').value;
    document.getElementById('faculty-fields').style.display = role === 'faculty' ? 'block' : 'none';
  }

  let editingUserId = null;
  function openAddUser() {
    editingUserId = null;
    document.getElementById('user-modal-title').textContent = 'Add User';
    ['uf-name','uf-username','uf-email','uf-password','uf-empid'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('uf-maxunits').value = 21;
    document.getElementById('uf-role').value = 'faculty';
    document.getElementById('uf-dept').value = 'BSIT';
    document.getElementById('uf-status').value = 'active';
    document.getElementById('uf-password-label').textContent = 'Password *';
    document.getElementById('uf-password').placeholder = 'Set password';
    document.getElementById('user-error').style.display = 'none';
    toggleFacultyFields();
    UI.openModal('user-modal');
  }

  function editUser(id) {
    editingUserId = id;
    const u = users.find(x => String(x.id) === String(id));
    document.getElementById('user-modal-title').textContent = 'Edit User';
    document.getElementById('uf-name').value = u.name;
    document.getElementById('uf-username').value = u.username;
    document.getElementById('uf-email').value = u.email;
    document.getElementById('uf-password').value = '';  // never expose password; blank = keep current
    document.getElementById('uf-role').value = u.role;
    document.getElementById('uf-dept').value = u.department || 'BSIT';
    document.getElementById('uf-empid').value = u.employee_id || u.employeeId || '';
    document.getElementById('uf-maxunits').value = u.max_units || 21;
    document.getElementById('uf-status').value = u.status;
    document.getElementById('uf-password-label').textContent = 'Password (leave blank to keep current)';
    document.getElementById('uf-password').placeholder = 'Leave blank to keep current';
    document.getElementById('user-error').style.display = 'none';
    toggleFacultyFields();
    UI.openModal('user-modal');
  }

  async function saveUser() {
    const name = document.getElementById('uf-name').value.trim();
    const username = document.getElementById('uf-username').value.trim();
    const email = document.getElementById('uf-email').value.trim();
    const password = document.getElementById('uf-password').value.trim();
    if (!name || !username || !email || (!editingUserId && !password)) { document.getElementById('user-error').style.display = 'flex'; return; }

    // (duplicate check handled by PHP)

    const role = document.getElementById('uf-role').value;
    const data = {
      name, username, email, password, role,
      department: document.getElementById('uf-dept').value,
      status: document.getElementById('uf-status').value,
      ...(role === 'faculty' ? {
        employeeId: document.getElementById('uf-empid').value.trim(),
        maxUnits: parseInt(document.getElementById('uf-maxunits').value) || 21
      } : {})
    };

    const form = new FormData();
    const action = editingUserId ? 'edit' : 'add';
    form.append('action', action);
    if (editingUserId) form.append('id', editingUserId);
    Object.keys(data).forEach(k => form.append(k, data[k]));

    const res    = await fetch(BACKEND + 'users.php', { method: 'POST', body: form });
    const result = await res.json();

    if (result.success) {
      UI.showToast(editingUserId ? 'User updated.' : 'User added.');
      UI.closeModal('user-modal');
      loadUsers();
    } else {
      document.getElementById('user-error').textContent = result.message;
      document.getElementById('user-error').style.display = 'flex';
    }
  }

  async function toggleStatus(id) {
    const form = new FormData();
    form.append('action', 'toggle_status');
    form.append('id', id);
    const res    = await fetch(BACKEND + 'users.php', { method: 'POST', body: form });
    const result = await res.json();
    if (result.success) {
      UI.showToast('Status updated.');
      loadUsers();
    }
  }

  function deleteUser(id) {
    UI.confirm('Delete this user? This cannot be undone.', async () => {
      const form = new FormData();
      form.append('action', 'delete');
      form.append('id', id);
      const res    = await fetch(BACKEND + 'users.php', { method: 'POST', body: form });
      const result = await res.json();
      if (result.success) {
        UI.showToast('User deleted.', 'warning');
        loadUsers();
      }
    });
  }

  loadUsers();
</script>
</body>
</html>
