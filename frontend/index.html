<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UMSync – Login</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .role-hint { 
      background: #f0f4ff; 
      border-radius: 8px; 
      padding: 12px 14px; 
      margin-bottom: 20px; 
      font-size: 12px; 
    }
    .role-hint p { 
      font-weight: 700; 
      margin-bottom: 6px; 
      color: var(--primary);
    }
    .role-hint table {
      width: 100%; 
      border-collapse: collapse; 
    }
    .role-hint td { 
      padding: 2px 6px; 
      color: var(--text-muted); 
    }
    .role-hint td:first-child { 
      font-weight: 600; 
      color: var(--text); 
      width: 90px; 
    }
    .show-pw { 
      position: relative; 
    }
    .show-pw input { 
      padding-right: 40px; 
    }
    .show-pw button { 
      position: absolute; 
      right: 10px;
      top: 50%; 
      transform: translateY(-50%);
      background: none; 
      border: none; 
      cursor: pointer; 
      color: var(--text-muted); padding: 4px; 
    }
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/></svg>
      </div>
      <h1>UMSync</h1>
      <p>Subject Loading & Room Assignment System</p>
    </div>

    <div id="login-error" class="alert alert-danger" style="display:none">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      <span id="login-error-msg">Invalid credentials.</span>
    </div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter your username" autocomplete="username" required>
        <div class="invalid-feedback">Username is required.</div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="show-pw">
          <input type="password" id="password" class="form-control" placeholder="Enter your password" autocomplete="current-password" required>
          <button type="button" id="toggle-pw" title="Show/hide password">
            <svg id="eye-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="invalid-feedback">Password is required.</div>
      </div>

      <div class="role-hint">
        <p>Demo Accounts</p>
        <table>
          <tr><td>Admin</td><td>admin / admin123</td></tr>
          <tr><td>Registrar</td><td>registrar / reg123</td></tr>
        </table>
      </div>

      <button type="submit" class="btn btn-primary btn-lg btn-block" id="login-btn">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Sign In
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:12px;color:var(--text-muted)">
      Academic Year 2025–2026 &nbsp;|&nbsp; 1st Semester
    </p>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
  Auth.init();
  if (Auth.currentUser) window.location.href = 'dashboard.html';

  document.getElementById('toggle-pw').addEventListener('click', function() {
    const pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  });

  document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const username = document.getElementById('username');
    const password = document.getElementById('password');
    let valid = true;
    [username, password].forEach(f => { f.classList.remove('is-invalid'); });
    if (!username.value.trim()) { username.classList.add('is-invalid'); valid = false; }
    if (!password.value.trim()) { password.classList.add('is-invalid'); valid = false; }
    if (!valid) return;

    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'Signing in...';

    const result = await Auth.login(username.value.trim(), password.value.trim());
    if (result.success) {
      window.location.href = 'dashboard.html';
    } else {
      document.getElementById('login-error').style.display = 'flex';
      document.getElementById('login-error-msg').textContent = result.message;
      btn.disabled = false;
      btn.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Sign In`;
    }
  });
</script>
</body>
</html>
