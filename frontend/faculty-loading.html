<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faculty Loading – UMSync</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="page-content">

      <div class="page-header">
        <div><h2>Faculty Loading</h2><p>Assign subjects and manage teaching loads</p></div>
        <button class="btn btn-primary" onclick="openAssignModal()">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Assign Subject
        </button>
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('loading')">Loading Summary</button>
        <button class="tab-btn" onclick="switchTab('assignments')">All Assignments</button>
        <button class="tab-btn" onclick="switchTab('overload')">Overload Requests</button>
      </div>

      <!-- Loading Summary Tab -->
      <div class="tab-pane active" id="tab-loading">
        <div id="faculty-cards">
          <div style="text-align:center;padding:40px;color:var(--text-muted)">Loading...</div>
        </div>
      </div>

      <!-- All Assignments Tab -->
      <div class="tab-pane" id="tab-assignments">
        <div class="card">
          <div class="card-body">
            <div class="toolbar">
              <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="assign-search" placeholder="Search..." oninput="renderAssignments()">
              </div>
              <select class="filter-select" id="assign-filter-faculty" onchange="renderAssignments()">
                <option value="">All Faculty</option>
              </select>
            </div>
            <div class="table-wrapper">
              <table>
                <thead><tr><th>Faculty</th><th>Subject</th><th>Section</th><th>Room</th><th>Schedule</th><th>Units</th><th>Actions</th></tr></thead>
                <tbody id="assignments-tbody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- Overload Tab -->
      <div class="tab-pane" id="tab-overload">
        <div class="card">
          <div class="card-body">
            <div class="alert alert-info">
              Faculty exceeding their maximum teaching load are listed here.
            </div>
            <div id="overload-list"></div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Assign Modal -->
<div class="modal-overlay" id="assign-modal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3>Assign Subject to Faculty</h3>
      <button class="modal-close" onclick="UI.closeModal('assign-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>Faculty Member *</label>
          <select id="af-faculty" class="form-control">
            <option value="">Select Faculty</option>
          </select>
        </div>
        <div class="form-group">
          <label>Subject *</label>
          <select id="af-subject" class="form-control">
            <option value="">Select Subject</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Section *</label>
          <input type="text" id="af-section" class="form-control" placeholder="e.g. BSIT-1A">
        </div>
        <div class="form-group">
          <label>Room *</label>
          <select id="af-room" class="form-control">
            <option value="">Select Room</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Day *</label>
          <select id="af-day" class="form-control">
            <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
            <option>Thursday</option><option>Friday</option><option>Saturday</option>
          </select>
        </div>
        <div class="form-group">
          <label>Start Time *</label>
          <input type="time" id="af-start" class="form-control" value="07:30">
        </div>
        <div class="form-group">
          <label>End Time *</label>
          <input type="time" id="af-end" class="form-control" value="09:00">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Class Type</label>
          <select id="af-type" class="form-control"><option>Lecture</option><option>Lab</option></select>
        </div>
        <div class="form-group">
          <label>No. of Students</label>
          <input type="number" id="af-students" class="form-control" value="30" min="1">
        </div>
      </div>
      <div id="conflict-alert" class="alert alert-danger" style="display:none"></div>
      <div id="assign-error" class="alert alert-danger" style="display:none">Please fill in all required fields.</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="UI.closeModal('assign-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveAssignment()">Save Assignment</button>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script>


  Auth.requireAuth(['admin', 'registrar']);
  UI.renderSidebar('faculty-loading');
  UI.renderTopbar('Faculty Loading', 'Assign and manage teaching loads');

  // Store data fetched from PHP
  let allFaculty   = [];
  let allSubjects  = [];
  let allRooms     = [];
  let allSchedules = [];

  // Switch between tabs
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', ['loading', 'assignments', 'overload'][i] === tab);
    });
    document.querySelectorAll('.tab-pane').forEach((p, i) => {
      p.classList.toggle('active', ['tab-loading', 'tab-assignments', 'tab-overload'][i] === 'tab-' + tab);
    });
    if (tab === 'assignments') renderAssignments();
    if (tab === 'overload')    renderOverload();
  }

  // Load all data from PHP backend
  async function loadAllData() {
    const fd1 = new FormData(); fd1.append('action', 'get_all');
    const fd3 = new FormData(); fd3.append('action', 'get_all');
    const fd4 = new FormData(); fd4.append('action', 'get_all');

    const [uRes, sRes, rRes, scRes] = await Promise.all([
      fetch(BACKEND + 'users.php',                        { method: 'POST', body: fd1 }).then(r => r.json()),
      fetch(BACKEND + 'subjects.php?action=get_subjects').then(r => r.json()),
      fetch(BACKEND + 'rooms.php',                        { method: 'POST', body: fd3 }).then(r => r.json()),
      fetch(BACKEND + 'schedules.php?action=get_all').then(r => r.json()),
    ]);

    allFaculty   = uRes.success  ? uRes.data.filter(u => u.role === 'faculty')  : [];
    allSubjects  = sRes.success  ? sRes.data   : [];
    allRooms     = rRes.success  ? rRes.data   : [];
    allSchedules = scRes.success ? scRes.data  : [];

    renderFacultyCards();
  }

  // Render faculty loading summary cards
  function renderFacultyCards() {
    if (!allFaculty.length) {
      document.getElementById('faculty-cards').innerHTML =
        '<div style="text-align:center;padding:40px;color:var(--text-muted)">No faculty found. <a href="users.html">Add faculty →</a></div>';
      return;
    }

    document.getElementById('faculty-cards').innerHTML = allFaculty.map(f => {
      const schedules = allSchedules.filter(s => s.faculty_id == f.id);
      const units     = schedules.reduce((sum, s) => sum + (parseInt(s.units) || 0), 0);
      const maxUnits  = f.max_units || 21;
      const pct       = Math.min(Math.round((units / maxUnits) * 100), 100);
      const color     = pct > 100 ? 'red' : pct > 80 ? 'orange' : 'green';
      const isOverload = units > maxUnits;
      const initials  = f.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();

      return `
        <div class="card" style="margin-bottom:16px">
          <div class="card-header">
            <div class="d-flex align-center gap-3">
              <div style="width:42px;height:42px;border-radius:50%;background:var(--primary-light);color:white;display:flex;align-items:center;justify-content:center;font-weight:700">${initials}</div>
              <div>
                <div class="fw-bold">${f.name}</div>
                <div class="text-muted" style="font-size:12px">${f.department || ''}</div>
              </div>
            </div>
            <div class="d-flex align-center gap-2">
              ${isOverload ? '<span class="badge badge-danger">Overload</span>' : ''}
              <span class="badge badge-${f.status === 'active' ? 'success' : 'secondary'}">${f.status}</span>
              <span style="font-size:13px;font-weight:700">${units}/${maxUnits} units</span>
            </div>
          </div>
          <div class="card-body">
            <div class="progress-bar-wrap" style="margin-bottom:12px">
              <div class="progress-bar ${color}" style="width:${pct}%"></div>
            </div>
            ${schedules.length ? `
              <div class="table-wrapper">
                <table>
                  <thead><tr><th>Subject</th><th>Section</th><th>Room</th><th>Day/Time</th><th>Units</th><th></th></tr></thead>
                  <tbody>
                    ${schedules.map(s => `
                      <tr>
                        <td><div class="fw-bold">${s.subject_code}</div><div class="text-muted" style="font-size:11px">${s.subject_title || ''}</div></td>
                        <td>${s.section}</td>
                        <td><span class="badge badge-info">${s.room_number}</span></td>
                        <td style="font-size:12px">${s.day}<br>${s.start_time}–${s.end_time}</td>
                        <td style="text-align:center">${s.units || '–'}</td>
                        <td><button class="btn btn-sm btn-danger" onclick="removeAssignment(${s.id})">Remove</button></td>
                      </tr>`).join('')}
                  </tbody>
                </table>
              </div>` : '<div class="text-muted" style="font-size:13px;text-align:center;padding:12px">No subjects assigned yet.</div>'}
          </div>
        </div>`;
    }).join('');
  }

  // Render all assignments tab
  function renderAssignments() {
    const facFilter = document.getElementById('assign-filter-faculty');
    const curVal    = facFilter.value;
    facFilter.innerHTML = '<option value="">All Faculty</option>' +
      allFaculty.map(f => `<option value="${f.id}" ${f.id == curVal ? 'selected' : ''}>${f.name}</option>`).join('');

    const search = document.getElementById('assign-search').value.toLowerCase();
    const fid    = facFilter.value;

    const data = allSchedules.filter(s =>
      (!search || (s.subject_code || '').toLowerCase().includes(search) ||
                  (s.faculty_name || '').toLowerCase().includes(search) ||
                  (s.section || '').toLowerCase().includes(search)) &&
      (!fid || s.faculty_id == fid)
    );

    document.getElementById('assignments-tbody').innerHTML = data.map(s => `
      <tr>
        <td>${s.faculty_name}</td>
        <td><span class="badge badge-primary">${s.subject_code}</span> ${s.subject_title || ''}</td>
        <td>${s.section}</td>
        <td>${s.room_number}</td>
        <td style="font-size:12px">${s.day} ${s.start_time}–${s.end_time}</td>
        <td style="text-align:center">${s.units || '–'}</td>
        <td><button class="btn btn-sm btn-danger" onclick="removeAssignment(${s.id})">Remove</button></td>
      </tr>`).join('') ||
      '<tr><td colspan="7" class="text-muted" style="text-align:center;padding:20px">No assignments found.</td></tr>';
  }

  // Render overload tab
  function renderOverload() {
    const overloaded = allFaculty.filter(f => {
      const units = allSchedules.filter(s => s.faculty_id == f.id)
                                .reduce((sum, s) => sum + (parseInt(s.units) || 0), 0);
      return units > (f.max_units || 21);
    });

    document.getElementById('overload-list').innerHTML = overloaded.length
      ? overloaded.map(f => {
          const units = allSchedules.filter(s => s.faculty_id == f.id)
                                    .reduce((sum, s) => sum + (parseInt(s.units) || 0), 0);
          return `<div class="alert alert-warning d-flex justify-between align-center">
            <div><strong>${f.name}</strong> — ${units} units assigned (max: ${f.max_units}). Overload: ${units - f.max_units} units.</div>
          </div>`;
        }).join('')
      : '<div class="empty-state"><p>No overload cases detected.</p></div>';
  }

  // Open assign modal and populate dropdowns
  function openAssignModal() {
    document.getElementById('af-faculty').innerHTML = '<option value="">Select Faculty</option>' +
      allFaculty.filter(f => f.status === 'active')
        .map(f => `<option value="${f.id}">${f.name} (${f.department || ''})</option>`).join('');

    document.getElementById('af-subject').innerHTML = '<option value="">Select Subject</option>' +
      allSubjects.map(s => `<option value="${s.id}">${s.code} – ${s.title} (${s.units} units)</option>`).join('');

    document.getElementById('af-room').innerHTML = '<option value="">Select Room</option>' +
      allRooms.filter(r => r.status === 'available')
        .map(r => `<option value="${r.id}">${r.number} (${r.type}, Cap: ${r.capacity})</option>`).join('');

    document.getElementById('af-section').value  = '';
    document.getElementById('af-start').value    = '07:30';
    document.getElementById('af-end').value      = '09:00';
    document.getElementById('af-students').value = '30';
    document.getElementById('assign-error').style.display   = 'none';
    document.getElementById('conflict-alert').style.display = 'none';
    UI.openModal('assign-modal');
  }

  // Save assignment - calls schedules.php
  async function saveAssignment() {
    const fid     = document.getElementById('af-faculty').value;
    const sid     = document.getElementById('af-subject').value;
    const section = document.getElementById('af-section').value.trim();
    const rid     = document.getElementById('af-room').value;
    const day     = document.getElementById('af-day').value;
    const start   = document.getElementById('af-start').value;
    const end     = document.getElementById('af-end').value;

    document.getElementById('assign-error').style.display   = 'none';
    document.getElementById('conflict-alert').style.display = 'none';

    if (!fid || !sid || !section || !rid || !start || !end) {
      document.getElementById('assign-error').style.display = 'flex';
      return;
    }

    const formData = new FormData();
    formData.append('action',     'add');
    formData.append('faculty_id', fid);
    formData.append('subject_id', sid);
    formData.append('room_id',    rid);
    formData.append('section',    section);
    formData.append('day',        day);
    formData.append('start_time', start);
    formData.append('end_time',   end);
    formData.append('type',       document.getElementById('af-type').value);
    formData.append('students',   document.getElementById('af-students').value);

    const res    = await fetch(BACKEND + 'schedules.php', { method: 'POST', body: formData });
    const result = await res.json();

    if (result.success) {
      UI.showToast('Subject assigned successfully!');
      UI.closeModal('assign-modal');
      loadAllData(); // Refresh all data
    } else {
      const ca = document.getElementById('conflict-alert');
      ca.style.display = 'flex';
      ca.innerHTML = '⚠ ' + (result.conflicts ? result.conflicts.join('<br>') : result.message);
    }
  }

  // Remove assignment - calls schedules.php
  function removeAssignment(id) {
    UI.confirm('Remove this assignment?', async () => {
      const formData = new FormData();
      formData.append('action', 'delete');
      formData.append('id', id);
      const res    = await fetch(BACKEND + 'schedules.php', { method: 'POST', body: formData });
      const result = await res.json();
      if (result.success) {
        UI.showToast('Assignment removed.', 'warning');
        loadAllData();
      }
    });
  }

  // Load data when page opens
  loadAllData();
</script>
</body>
</html>
