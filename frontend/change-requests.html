<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Requests – UMSync</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="page-content">

      <div class="page-header">
        <div><h2>Schedule Change Requests</h2><p>Submit and track your schedule change requests</p></div>
        <button class="btn btn-primary" onclick="UI.openModal('request-modal')">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Request
        </button>
      </div>

      <div class="stat-grid" style="margin-bottom:20px">
        <div class="stat-card orange">
          <div class="stat-icon orange"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
          <div class="stat-info"><div class="stat-value" id="cnt-pending">0</div><div class="stat-label">Pending</div></div>
        </div>
        <div class="stat-card green">
          <div class="stat-icon green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="stat-info"><div class="stat-value" id="cnt-approved">0</div><div class="stat-label">Approved</div></div>
        </div>
        <div class="stat-card red">
          <div class="stat-icon red"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
          <div class="stat-info"><div class="stat-value" id="cnt-rejected">0</div><div class="stat-label">Rejected</div></div>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <div id="requests-list"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Request Modal -->
<div class="modal-overlay" id="request-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>New Schedule Change Request</h3>
      <button class="modal-close" onclick="UI.closeModal('request-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Select Schedule *</label>
        <select id="req-schedule" class="form-control">
          <option value="">Select your schedule</option>
        </select>
      </div>
      <div class="form-group">
        <label>Request Type *</label>
        <select id="req-type" class="form-control">
          <option>Reschedule</option>
          <option>Room Change</option>
          <option>Faculty Substitute</option>
          <option>Cancel Class</option>
        </select>
      </div>
      <div class="form-group">
        <label>Reason *</label>
        <textarea id="req-reason" class="form-control" rows="3" placeholder="Explain why you need this change..."></textarea>
      </div>
      <div class="form-group">
        <label>Requested Change Details</label>
        <input type="text" id="req-details" class="form-control" placeholder="e.g. Move to Thursday 10:30–12:00, Room 102">
        <div class="form-hint">Provide specific details about what you're requesting</div>
      </div>
      <div id="req-error" class="alert alert-danger" style="display:none">Please fill in all required fields.</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="UI.closeModal('request-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="submitRequest()">Submit Request</button>
    </div>
  </div>
</div>


<script src="js/auth.js"></script>
<script>

  Auth.requireAuth(['faculty','admin','registrar']);
  UI.renderSidebar('change-requests');
  UI.renderTopbar('Change Requests', 'Manage schedule change requests');

  let requests = [], schedules = [];

  async function loadAll() {
    const user = Auth.currentUser;
    const [rRes, sRes] = await Promise.all([
      fetch(BACKEND + 'change_requests.php?action=get_all'),
      fetch(BACKEND + 'schedules.php?action=get_all'),
    ]);
    const rData = await rRes.json();
    const sData = await sRes.json();
    requests  = rData.data || [];
    schedules = sData.data || [];
    // Faculty only sees their own
    if (user.role === 'faculty') {
      requests = requests.filter(r => r.faculty_id == user.id);
    }
    renderRequests();
    populateScheduleSelect();
  }

  function populateScheduleSelect() {
    const user = Auth.currentUser;
    const sel  = document.getElementById('req-schedule');
    if (!sel) return;
    const isAdmin  = ['admin','registrar'].includes(user.role);
    const myScheds = isAdmin ? schedules : schedules.filter(s => String(s.faculty_id) === String(user.id));
    sel.innerHTML  = '<option value="">Select your schedule</option>' +
      myScheds.map(s => {
        const start = (s.start_time || '').substring(0, 5);
        return `<option value="${s.id}">${s.subject_code} – ${s.section} (${s.day} ${start})</option>`;
      }).join('');
  }

  function renderRequests() {
    const container = document.getElementById('requests-list');
    if (!container) return;
    const isAdmin = ['admin','registrar'].includes(Auth.currentUser.role);

    // Update stat counters
    document.getElementById('cnt-pending').textContent  = requests.filter(r => r.status === 'pending').length;
    document.getElementById('cnt-approved').textContent = requests.filter(r => r.status === 'approved').length;
    document.getElementById('cnt-rejected').textContent = requests.filter(r => r.status === 'rejected').length;

    if (!requests.length) {
      container.innerHTML = '<p style="text-align:center;padding:30px;color:var(--text-muted)">No change requests found.</p>';
      return;
    }

    container.innerHTML = `
      <div class="table-wrapper">
        <table>
          <thead><tr><th>Faculty</th><th>Schedule</th><th>Type</th><th>Reason</th><th>Details</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>
            ${requests.map(r => `<tr>
              <td class="fw-bold" style="font-size:12px">${r.faculty_name || '—'}</td>
              <td style="font-size:12px">${r.subject_code || ''} ${r.section || ''}<br><span style="color:var(--text-muted)">${r.day || ''} ${(r.start_time||'').substring(0,5)}</span></td>
              <td><span class="badge badge-info">${r.request_type || r.type || '—'}</span></td>
              <td style="font-size:12px">${r.reason}</td>
              <td style="font-size:12px">${r.new_time || r.details || '—'}</td>
              <td><span class="badge badge-${r.status==='pending'?'warning':r.status==='approved'?'success':'danger'}">${r.status}</span></td>
              <td>
                <div class="d-flex gap-2">
                  ${isAdmin && r.status === 'pending' ? `
                    <button class="btn btn-sm btn-success" onclick="approveRequest(${r.id})">Approve</button>
                    <button class="btn btn-sm btn-danger"  onclick="rejectRequest(${r.id})">Reject</button>` : ''}
                  ${!isAdmin ? `<button class="btn btn-sm btn-outline" onclick="deleteRequest(${r.id})">Delete</button>` : ''}
                </div>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  async function submitRequest() {
    const schedule_id = document.getElementById('req-schedule').value;
    const reason      = document.getElementById('req-reason').value.trim();
    const details     = document.getElementById('req-details') ? document.getElementById('req-details').value : '';
    if (!schedule_id || !reason) { UI.showToast('Please fill in required fields.', 'error'); return; }

    const formData = new FormData();
    formData.append('action',        'submit');
    formData.append('faculty_id',    Auth.currentUser.id);
    formData.append('schedule_id',   schedule_id);
    formData.append('request_type',  document.getElementById('req-type') ? document.getElementById('req-type').value : 'Reschedule');
    formData.append('reason',        reason);
    formData.append('new_time',      details);

    const res    = await fetch(BACKEND + 'change_requests.php', { method: 'POST', body: formData });
    const result = await res.json();
    if (result.success) {
      UI.showToast('Change request submitted.');
      UI.closeModal('request-modal');
      loadAll();
    } else {
      UI.showToast(result.message, 'error');
    }
  }

  async function approveRequest(id) {
    const formData = new FormData();
    formData.append('action', 'approve');
    formData.append('id', id);
    const res    = await fetch(BACKEND + 'change_requests.php', { method: 'POST', body: formData });
    const result = await res.json();
    if (result.success) { UI.showToast('Request approved.'); loadAll(); }
    else { UI.showToast(result.message, 'error'); }
  }

  async function rejectRequest(id) {
    const formData = new FormData();
    formData.append('action', 'reject');
    formData.append('id', id);
    const res    = await fetch(BACKEND + 'change_requests.php', { method: 'POST', body: formData });
    const result = await res.json();
    if (result.success) { UI.showToast('Request rejected.', 'warning'); loadAll(); }
    else { UI.showToast(result.message, 'error'); }
  }

  async function deleteRequest(id) {
    UI.confirm('Delete this request?', async () => {
      const formData = new FormData();
      formData.append('action', 'delete');
      formData.append('id', id);
      const res    = await fetch(BACKEND + 'change_requests.php', { method: 'POST', body: formData });
      const result = await res.json();
      if (result.success) { UI.showToast('Request deleted.', 'warning'); loadAll(); }
      else { UI.showToast(result.message, 'error'); }
    });
  }

  loadAll();
</script>
</body>
</html>
